<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;-webkit-user-select:none}
  #stage{position:relative;width:240px;height:260px}
  .renderer{position:absolute;left:0;top:20px;width:240px;height:240px;display:none}
  .renderer.on{display:block}
  #vec{transform-origin:center}
  #vec.bob{animation:bob 3s ease-in-out infinite}
  .pupils,.brows,.ring{transform-box:fill-box;transform-origin:center}
  .pupils{animation:blink 4.2s infinite}
  .ring{opacity:0}
  .m-scolding #vec{animation:shake .24s ease-in-out infinite}
  .m-scolding .brows{transform:translateY(7px)}
  .m-watching .pupils{animation:scan 2.4s ease-in-out infinite}
  .m-stuck .ring{opacity:1;animation:pulse 1s ease-out infinite}
  .m-stuck .brows{transform:translateY(5px)}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
  @keyframes shake{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-5px) rotate(-3deg)}75%{transform:translateX(5px) rotate(3deg)}}
  @keyframes scan{0%,100%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
  @keyframes pulse{0%{transform:scale(.82);opacity:.75}100%{transform:scale(1.5);opacity:0}}
  #pix{image-rendering:pixelated;width:240px;height:240px}
  #bubble{position:absolute;left:0;top:0;width:240px;text-align:center;font-size:13px;font-weight:500;
    color:#fff;opacity:0;transition:opacity .2s}
  #bubble span{background:#222a;padding:4px 10px;border-radius:10px;display:inline-block;max-width:220px}
  #bubble.show{opacity:1}
</style></head>
<body>
<div id="stage" class="m-watching">
  <div id="bubble"><span></span></div>
  <div id="vec" class="renderer">
    <svg viewBox="0 0 200 200" width="240" height="240" xmlns="http://www.w3.org/2000/svg">
      <polygon points="62,58 80,38 86,66" fill="#5560e6"/><polygon points="138,58 120,38 114,66" fill="#5560e6"/>
      <ellipse cx="100" cy="114" rx="60" ry="64" fill="#5560e6"/>
      <ellipse cx="100" cy="134" rx="38" ry="34" fill="#e9ecff"/>
      <ellipse cx="100" cy="96" rx="52" ry="46" fill="#f5efe2"/>
      <ellipse cx="86" cy="178" rx="11" ry="5" fill="#f0a93a"/><ellipse cx="114" cy="178" rx="11" ry="5" fill="#f0a93a"/>
      <circle cx="80" cy="92" r="19" fill="#fff"/><circle cx="120" cy="92" r="19" fill="#fff"/>
      <circle cx="80" cy="92" r="19" fill="none" stroke="#f0a93a" stroke-width="3"/><circle cx="120" cy="92" r="19" fill="none" stroke="#f0a93a" stroke-width="3"/>
      <g class="pupils"><circle cx="80" cy="94" r="8" fill="#232850"/><circle cx="120" cy="94" r="8" fill="#232850"/>
        <circle cx="83" cy="91" r="2.6" fill="#fff"/><circle cx="123" cy="91" r="2.6" fill="#fff"/></g>
      <polygon points="92,108 108,108 100,123" fill="#f0a93a"/>
      <g class="brows"><path d="M66 73 Q80 66 93 73" fill="none" stroke="#232850" stroke-width="5" stroke-linecap="round"/>
        <path d="M107 73 Q120 66 134 73" fill="none" stroke="#232850" stroke-width="5" stroke-linecap="round"/></g>
      <circle class="ring" cx="100" cy="104" r="84" fill="none" stroke="#d44b43" stroke-width="4"/>
    </svg>
  </div>
  <canvas id="pix" class="renderer" width="80" height="80"></canvas>
  <canvas id="td" class="renderer" width="240" height="240"></canvas>
</div>
<script src="three.min.js"></script>
<script>
(function(){
  var stage=document.getElementById('stage'), bubble=document.getElementById('bubble'),
      bubbleSpan=bubble.querySelector('span');
  var skinEls={vector:document.getElementById('vec'),pixel:document.getElementById('pix'),'3d':document.getElementById('td')};
  var state={status:'watching',character:'duck',scold:''}, skin='3d';

  function mood(s){
    if(s==='scolding')return 'scolding';
    if(s==='stuck')return 'stuck';
    if(s==='working'||s==='done')return 'working';
    return 'watching';
  }
  function applyState(){
    var m=mood(state.status);
    stage.className='m-'+m;
    var show=(m==='scolding'||m==='stuck')&&(state.scold||m==='stuck');
    bubbleSpan.textContent=state.scold||(m==='stuck'?'비상! 확인 요망':'');
    bubble.className=show?'show':'';
  }
  function setSkin(name){
    if(!skinEls[name])name='3d'; skin=name;
    for(var k in skinEls){skinEls[k].className='renderer'+(k===name?' on':'');}
    document.getElementById('vec').classList.toggle('bob',name==='vector');
  }

  window.nonya={
    setState:function(s){if(s)for(var k in s)state[k]=s[k];applyState();},
    setSkin:function(n){setSkin(n);}
  };

  // ---- pixel renderer (chunky, smoothing off) ----
  var pc=document.getElementById('pix'), px=pc.getContext('2d'); px.imageSmoothingEnabled=false;
  function E(cx,cy,rx,ry,c,by){px.fillStyle=c;for(var y=-ry;y<=ry;y++)for(var xx=-rx;xx<=rx;xx++){if((xx*xx)/(rx*rx)+(y*y)/(ry*ry)<=1)px.fillRect(cx+xx,cy+y+by,1,1);}}
  function drawPixel(t){
    var m=mood(state.status), by=Math.round(Math.sin(t*1.6)*2);
    px.clearRect(0,0,80,80);
    E(40,48,24,26,'#5560e6',by);E(40,56,15,13,'#e9ecff',by);E(40,40,21,18,'#f5efe2',by);
    E(28,36,8,8,'#5560e6',by);E(52,36,8,8,'#5560e6',by);
    E(32,38,7,7,'#ffffff',by);E(48,38,7,7,'#ffffff',by);
    E(32,38,7,7,'#f0a93a',by);E(48,38,7,7,'#f0a93a',by);
    E(32,38,5,5,'#ffffff',by);E(48,38,5,5,'#ffffff',by);
    var ey=(m==='scolding'||m==='stuck')?40:39;
    E(32,ey,3,3,'#232850',by);E(48,ey,3,3,'#232850',by);
    px.fillStyle='#232850';var bo=(m==='scolding'||m==='stuck')?2:0;
    px.fillRect(27,30+bo+by,9,2);px.fillRect(44,30+bo+by,9,2);
    px.fillStyle='#f0a93a';px.fillRect(38,45+by,4,5);
    E(31,74,4,2,'#f0a93a',0);E(49,74,4,2,'#f0a93a',0);
    if(m==='stuck'){px.strokeStyle='#d44b43';px.lineWidth=2;px.beginPath();px.arc(40,44,30+(Math.sin(t*5)*0.5+0.5)*7,0,7);px.stroke();}
  }

  // ---- 3D renderer (three.js) ----
  var owl,renderer3,scene3,camera3,le3,re3,brows3,alert3,ready3=false;
  function init3(){
    if(!window.THREE||ready3)return; ready3=true;
    var cv=document.getElementById('td');
    renderer3=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
    renderer3.setSize(240,240,false); renderer3.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    scene3=new THREE.Scene(); camera3=new THREE.PerspectiveCamera(40,1,0.1,100); camera3.position.set(0,0.4,7);
    scene3.add(new THREE.AmbientLight(0xffffff,0.72));
    var k=new THREE.DirectionalLight(0xffffff,0.95);k.position.set(3,5,5);scene3.add(k);
    var f=new THREE.DirectionalLight(0x9fb0ff,0.4);f.position.set(-4,-1,2);scene3.add(f);
    owl=new THREE.Group();scene3.add(owl);
    var I=new THREE.MeshStandardMaterial({color:0x5560e6,roughness:0.6}),
        C=new THREE.MeshStandardMaterial({color:0xf5efe2,roughness:0.85}),
        A=new THREE.MeshStandardMaterial({color:0xf0a93a,roughness:0.5}),
        D=new THREE.MeshStandardMaterial({color:0x232850,roughness:0.4}),
        Wt=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.3});
    var body=new THREE.Mesh(new THREE.SphereGeometry(1.5,40,40),I);body.scale.set(1,1.2,0.95);body.position.y=-0.4;owl.add(body);
    var face=new THREE.Mesh(new THREE.SphereGeometry(1.15,36,36),C);face.scale.set(1,0.95,0.5);face.position.set(0,0.35,1.0);owl.add(face);
    function eye(x){var g=new THREE.Group();var s=new THREE.Mesh(new THREE.SphereGeometry(0.42,28,28),Wt);s.scale.z=0.6;g.add(s);
      g.add(new THREE.Mesh(new THREE.TorusGeometry(0.42,0.06,16,32),A));var p=new THREE.Mesh(new THREE.SphereGeometry(0.2,20,20),D);p.position.z=0.3;g.add(p);
      g.position.set(x,0.5,1.5);return {g:g,s:s};}
    le3=eye(-0.5);re3=eye(0.5);owl.add(le3.g);owl.add(re3.g);
    var beak=new THREE.Mesh(new THREE.ConeGeometry(0.17,0.42,4),A);beak.position.set(0,0.12,1.72);beak.rotation.x=Math.PI/2;owl.add(beak);
    function tuft(x,r){var tf=new THREE.Mesh(new THREE.ConeGeometry(0.28,0.72,4),I);tf.position.set(x,1.55,0.4);tf.rotation.z=r;owl.add(tf);}
    tuft(-0.68,0.32);tuft(0.68,-0.32);
    brows3=new THREE.Group();
    function brow(x){var b=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.09,0.12),D);b.position.set(x,0.98,1.58);return b;}
    brows3.add(brow(-0.5));brows3.add(brow(0.5));owl.add(brows3);
    alert3=new THREE.Mesh(new THREE.TorusGeometry(2.0,0.07,16,48),new THREE.MeshStandardMaterial({color:0xd44b43,roughness:0.5,emissive:0xd44b43,emissiveIntensity:0.35}));alert3.visible=false;owl.add(alert3);
  }
  function draw3(t){
    if(!ready3){init3();if(!ready3)return;}
    var m=mood(state.status);
    owl.position.y=Math.sin(t*1.6)*0.12;
    var bl=(Math.sin(t*1.1)>0.97)?0.1:1;le3.s.scale.y=bl;re3.s.scale.y=bl;
    owl.position.x=0;owl.rotation.z=0;owl.rotation.y=Math.sin(t*0.5)*0.12;brows3.position.y=0;alert3.visible=false;
    if(m==='watching')owl.rotation.y=Math.sin(t*1.4)*0.42;
    else if(m==='scolding'){owl.position.x=Math.sin(t*30)*0.06;owl.rotation.z=Math.sin(t*30)*0.05;brows3.position.y=-0.2;}
    else if(m==='stuck'){alert3.visible=true;var s=1+(Math.sin(t*5)*0.5+0.5)*0.32;alert3.scale.set(s,s,s);brows3.position.y=-0.12;}
    else if(m==='working')owl.rotation.y=Math.sin(t*0.8)*0.22;
    renderer3.render(scene3,camera3);
  }

  var t=0;
  function loop(){requestAnimationFrame(loop);t+=0.016;
    if(skin==='pixel')drawPixel(t); else if(skin==='3d')draw3(t);}
  setSkin('3d'); applyState(); loop();
})();
</script>
</body></html>
