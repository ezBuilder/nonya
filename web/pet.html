<!doctype html><meta charset="utf-8"><title>nonya-pet</title>
<style>
html,body{margin:0;padding:0;background:transparent;overflow:hidden}#c{display:block}
#bubble{position:fixed;left:50%;top:6%;transform:translateX(-50%) scale(0);
  transform-origin:center bottom;font:700 19px/1.25 -apple-system,'Apple SD Gothic Neo',sans-serif;
  color:#fff;background:rgba(20,16,24,.92);border:1.5px solid rgba(255,90,70,.9);
  padding:9px 15px;border-radius:14px;white-space:nowrap;pointer-events:none;
  box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 18px rgba(255,70,50,.35);opacity:0;
  transition:transform .28s cubic-bezier(.18,1.5,.5,1),opacity .2s}
#bubble.show{transform:translateX(-50%) scale(1);opacity:1}
#bubble::after{content:"";position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:rgba(20,16,24,.92);border-bottom:0}
</style>
<body>
<div id="bubble"></div>
<script type="importmap">{"imports":{"three":"./jsm/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './jsm/GLTFLoader.js';

const P = new URLSearchParams(location.hash.slice(1));
const ASSET = (p) => (P.get('base') ? P.get('base') + p : p);
let CHAR = P.get('model') || ASSET('chars/Vampire.glb');

// shared Mixamo clips (same skeleton across all characters -> load ONCE, reuse for all)
const CLIP_FILES = {
  idle:  ASSET('anim_Idle.glb'),  walk:  ASSET('anim_Walk.glb'),  run:   ASSET('anim_Run.glb'),
  angry: ASSET('anim_Angry.glb'), scream:ASSET('anim_Scream.glb'),cheer: ASSET('anim_Cheer.glb'),
};
for (const k in CLIP_FILES){ if (P.get(k)) CLIP_FILES[k] = P.get(k); }

const W = () => window.innerWidth, H = () => window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
renderer.domElement.id = 'c';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.add(new THREE.HemisphereLight(0xe2ebff, 0x3a3f4a, 1.0));
const key = new THREE.DirectionalLight(0xfff4e6, 1.7); key.position.set(3, 6, 5); scene.add(key);
const fill = new THREE.DirectionalLight(0x9fb4d8, 0.5); fill.position.set(-4, 2, 3); scene.add(fill);
const rim = new THREE.DirectionalLight(0x5fe0d0, 0.0); rim.position.set(-2, 4, -5); scene.add(rim); rim.userData.t = 0;

const cam = new THREE.PerspectiveCamera(30, W() / H(), 0.05, 5000);
const clock = new THREE.Clock();
const loader = new GLTFLoader();
const load = (u) => new Promise((res, rej) => loader.load(u, res, undefined, rej));

// Freeze the hips' horizontal translation so the character animates IN PLACE
// (e.g. the "running" clip leaps forward otherwise and walks out of the canvas).
// The window/container does the travelling; the body just cycles. Vertical bob kept.
function makeInPlace(clip){
  for (const t of clip.tracks){
    if (/Hips\.position$/.test(t.name)){
      const v = t.values, x0 = v[0], z0 = v[2];
      for (let i = 0; i < v.length; i += 3){ v[i] = x0; v[i+2] = z0; }
    }
  }
  return clip;
}
const clips = {};
const clipsReady = (async () => {        // sequential load = reliable (avoids parallel file:// races)
  for (const [n, f] of Object.entries(CLIP_FILES)) {
    try { const g = await load(f); if (g.animations && g.animations[0]) clips[n] = makeInPlace(g.animations[0]); } catch (e) {}
  }
})();

let root = null, mixer = null, actions = {}, current = null;
let walking = false, mood = 'watching', facing = 0, facingTarget = 0;
let baseScale = 1, restY = 0, summonScale = 0, summonTarget = 0;   // presence (fade) 0..1
let phase = 'hidden';                                              // hidden | descend | present | leave
let dropY = 0, dropV = 0, squash = 0, shake = 0, flash = 0, leaveZ = 0, charOpacity = 1;
let camBase = new THREE.Vector3();
let burst = [];                                                   // active particle systems
const bubble = document.getElementById('bubble');
const URGENT = { scolding: 1, stuck: 1 };

// soft round dust sprite (radial-gradient alpha) so particles aren't square dots
const DUST_TEX = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64; const g = c.getContext('2d');
  const grd = g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,'rgba(255,255,255,0.95)'); grd.addColorStop(0.45,'rgba(225,229,238,0.55)'); grd.addColorStop(1,'rgba(225,229,238,0)');
  g.fillStyle = grd; g.beginPath(); g.arc(32,32,32,0,7); g.fill();
  return new THREE.CanvasTexture(c);
})();
// dust: 'ring' = ground shockwave blasting outward; 'column' = smoke kicked upward
function makeDust(count, mode){
  const geo = new THREE.BufferGeometry(), pos = new Float32Array(count*3), vel = [];
  for (let i=0;i<count;i++){
    pos[i*3]=(Math.random()-0.5)*0.5; pos[i*3+1]=0.05+Math.random()*0.3; pos[i*3+2]=(Math.random()-0.5)*0.5;
    const a=Math.random()*6.283;
    if (mode==='ring'){ const r=0.7+Math.random()*1.7; vel.push(new THREE.Vector3(Math.cos(a)*r, 0.5+Math.random()*1.0, Math.sin(a)*r)); }
    else { const r=0.25+Math.random()*0.7; vel.push(new THREE.Vector3(Math.cos(a)*r, 1.4+Math.random()*2.2, Math.sin(a)*r)); }
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ map:DUST_TEX, color:0xcdc7ba, size:0.42, transparent:true, opacity:0.85, depthWrite:false }));
  pts.frustumCulled=false; pts.userData = { vel, age:0, life: mode==='ring'?1.8:2.2, grow:0.55 };
  scene.add(pts); burst.push(pts); return pts;
}
function impact(){
  dropY = 0; dropV = 0; squash = 1.0; shake = 1.0; flash = 1.0;
  makeDust(240, 'ring'); makeDust(150, 'column');
  const a = actions.scream || actions.angry;
  if (a){ a.reset().setEffectiveWeight(1).fadeIn(0.06).play(); if (current && current !== a) current.fadeOut(0.06); current = a; }
}
window.nonyaSummon = (text) => {
  if (!window.__petReady) { window.__pendingSummon = (text || true); return; }   // defer until the model is loaded, else the fall plays on an empty scene
  phase = 'descend'; summonScale = 1; summonTarget = 1;
  dropY = 12.0; dropV = 0; walking = false; mood = 'watching'; facing = 0; facingTarget = 0;  // resident default = calm; impact roars briefly then settles to idle
  leaveZ = 0; charOpacity = 1; setCharOpacity(1);
};
window.nonyaDismiss = () => {
  if (phase === 'hidden') return;
  phase = 'leave'; leaveZ = 0; charOpacity = 1; mood = 'watching'; facingTarget = Math.PI;   // turn around, walk off
  const w = actions.walk; if (w){ w.reset().setEffectiveWeight(1).fadeIn(0.25).play(); if (current && current !== w) current.fadeOut(0.25); current = w; }
};
// fade the whole character via material opacity (used when it walks off into the distance)
function setCharOpacity(o){
  if (!root) return;
  root.traverse(n => { if (!n.isMesh) return;
    (Array.isArray(n.material) ? n.material : [n.material]).forEach(m => { if (!m) return; m.opacity = o; m.transparent = o < 0.999; m.depthWrite = o > 0.6; });
  });
}

function fixMaterials(obj){
  obj.traverse(n => { if (!n.isMesh) return; n.frustumCulled = false;
    (Array.isArray(n.material) ? n.material : [n.material]).forEach(m => {
      if (!m) return;
      if (m.transparent && m.map) { m.alphaTest = 0.5; m.transparent = false; m.depthWrite = true; }
      m.side = THREE.FrontSide;
    });
  });
}
const EYES = P.get('eyes') === '1';   // notch "island" mode: tight on the face, eyes peeking
function frame(){
  const box = new THREE.Box3().setFromObject(root);
  const h = box.getSize(new THREE.Vector3()).y;
  if (EYES){
    // tight close-up on the face/eyes (arms are down via the idle clip, so they're out of frame)
    const eyeY = h * 0.94, span = h * 0.17;
    const d = span / (2 * Math.tan(cam.fov * Math.PI / 360));
    cam.position.set(0, eyeY, d); cam.lookAt(0, eyeY, 0);
    return;
  }
  const d = (h * 2.2) / (2 * Math.tan(cam.fov * Math.PI / 360));    // lots of room above (fall) + around (shockwave)
  cam.position.set(0, h * 0.62, d); cam.lookAt(0, h * 0.46, 0);     // character sits a bit low, sky above for the drop
  camBase.copy(cam.position);
}
function activeClip(){
  if (walking) return (URGENT[mood] && actions.run) ? 'run' : 'walk';
  if (mood === 'scolding') return 'angry';
  if (mood === 'stuck')    return 'scream';
  if (mood === 'done')     return 'cheer';
  return 'idle';
}
function resolve(){
  if (!mixer) return;
  const name = activeClip(), next = actions[name];
  if (!next || next === current) return;
  next.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(0.3).play();
  if (current) current.fadeOut(0.3);
  current = next;
}

async function setCharacter(url){
  if (!EYES) await clipsReady;                            // eyes/island mode = static face, no clip load
  if (root) scene.remove(root);
  mixer = null; actions = {}; current = null;
  const g = await load(url); root = g.scene;
  let box = new THREE.Box3().setFromObject(root);
  const rawH = box.getSize(new THREE.Vector3()).y || 1;
  baseScale = 1.7 / rawH;
  root.scale.setScalar(baseScale);                        // normalize every character to ~1.7 tall
  box = new THREE.Box3().setFromObject(root);
  const ct = box.getCenter(new THREE.Vector3());
  root.position.x -= ct.x; root.position.z -= ct.z; root.position.y -= box.min.y;
  restY = root.position.y;
  fixMaterials(root); scene.add(root); frame();
  if (!EYES){
    mixer = new THREE.AnimationMixer(root);
    for (const n in clips){ const a = mixer.clipAction(clips[n]); a.setEffectiveWeight(0); a.play(); actions[n] = a; }
    if (P.get('mood')) mood = P.get('mood');          // headless test hooks
    if (P.get('walking') === '1') walking = true;
    resolve();
  } else {
    // island/eyes: pose with the idle clip so arms are DOWN (not a T-pose intruding on the face)
    try {
      const ig = await load(CLIP_FILES.idle);
      if (ig.animations && ig.animations[0]) { mixer = new THREE.AnimationMixer(root); mixer.clipAction(makeInPlace(ig.animations[0])).play(); }
    } catch (e) {}
  }
  window.__petReady = true;
  if (window.__pendingSummon !== undefined) {        // a summon arrived before load — run it now
    const t = window.__pendingSummon; window.__pendingSummon = undefined;
    window.nonyaSummon(typeof t === 'string' ? t : undefined);
  }
}

window.nonyaWalk = (on, dir) => { walking = !!on; if (typeof dir === 'number') facingTarget = dir; resolve(); };
window.nonyaMood = (status) => {
  mood = status || 'watching';
  const c = { scolding:[0xe0a43a,0.8], stuck:[0xff3a2a,1.1], done:[0x3fd08a,0.5], working:[0x3fd08a,0.3] }[status] || [0x5fe0d0,0.0];
  rim.color.setHex(c[0]); rim.userData.t = c[1];
  resolve();
};
window.nonyaCharacter = (url) => { window.__petReady = false; setCharacter(url).catch(() => {}); };
window.__petDebug = () => JSON.stringify({ ready: !!window.__petReady, nClips: Object.keys(clips).length, current: current ? activeClip() : 'none', mood, walking });
window.addEventListener('resize', () => { renderer.setSize(W(), H()); cam.aspect = W()/H(); cam.updateProjectionMatrix(); });

function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  rim.intensity += (rim.userData.t - rim.intensity) * Math.min(dt * 4, 1);
  facing += (facingTarget - facing) * Math.min(dt * 6, 1);
  // 강림 cinematic phase machine
  summonScale += (summonTarget - summonScale) * 0.16;
  if (phase === 'descend'){ dropV -= dt * 20; dropY += dropV * dt; if (dropY <= 0){ impact(); phase = 'present'; } }   // ~1.1s visible swoop from the top, accelerating into the slam
  else if (phase === 'leave'){
    leaveZ += dt * 4.0;                                   // keep walking; perspective shrinks it smoothly (no scale pop)
    if (leaveZ > 10) charOpacity = Math.max(0, charOpacity - dt * 1.0);  // gentle fade only once far away
    setCharOpacity(charOpacity);
    if (charOpacity <= 0.02){ phase = 'hidden'; summonScale = 0; summonTarget = 0; leaveZ = 0; charOpacity = 1; facing = facingTarget = 0; if (root) root.position.z = 0; setCharOpacity(1); }
  }
  squash = Math.max(0, squash - dt * 4.5);
  shake  = Math.max(0, shake  - dt * 3.2);
  flash  = Math.max(0, flash  - dt * 3.6);
  renderer.toneMappingExposure = 1.12 + flash * 1.4;
  if (root){
    root.rotation.y = facing;
    root.position.y = restY + dropY;
    root.position.z = -leaveZ;
    const s = baseScale * Math.max(0.0001, summonScale);
    root.scale.set(s * (1 + squash * 0.35), s * (1 - squash * 0.45), s * (1 + squash * 0.35));
    root.visible = summonScale > 0.02 && phase !== 'hidden';
  }
  cam.position.set(camBase.x + (Math.random() - 0.5) * shake * 0.3, camBase.y + (Math.random() - 0.5) * shake * 0.3, camBase.z);
  for (let i = burst.length - 1; i >= 0; i--){
    const b = burst[i], u = b.userData, p = b.geometry.attributes.position;
    u.age += dt;
    for (let j = 0; j < u.vel.length; j++){ p.array[j*3]+=u.vel[j].x*dt; p.array[j*3+1]+=u.vel[j].y*dt; p.array[j*3+2]+=u.vel[j].z*dt; u.vel[j].y -= dt*2.0; u.vel[j].multiplyScalar(0.92); }
    p.needsUpdate = true;
    b.material.opacity = Math.max(0, 0.95 * (1 - u.age / u.life));
    b.material.size += u.grow * dt;
    if (u.age >= u.life){ scene.remove(b); burst.splice(i, 1); }
  }
  if (mixer) mixer.update(dt);
  renderer.render(scene, cam);
}
setCharacter(CHAR).then(() => { if (P.get('test') === 'summon') setTimeout(() => window.nonyaSummon('노냐?!'), 600); }).catch(e => { document.title = 'ERR:' + e.message; });
tick();
</script>
</body>
